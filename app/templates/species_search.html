{% extends "base.html" %}

{% block title %}PlantLight — Buscador de Especies{% endblock %}

{% block content %}
<section class="search-hero">
    <h1>Buscador de <em>Especies</em></h1>
    <p class="subtitle">Encontrá los requerimientos de luz de tu planta y compará con tu ubicación actual.</p>
</section>

<div class="search-bar-wrapper">
    <span class="search-icon">🔍</span>
    <input
        id="species-search-input"
        type="text"
        name="q"
        placeholder="Buscá por nombre común o científico… (ej: tomate, Lactuca)"
        class="search-input"
        autocomplete="off"
        hx-get="/api/species/search"
        hx-trigger="keyup changed delay:300ms"
        hx-target="#species-results"
        hx-include="this"
        hx-headers='{"Accept": "text/html"}'
    >
    <button id="btn-compare-mode" class="btn-secondary btn-compare-toggle" onclick="toggleCompareMode()">
        ⚖️ Comparar especies
    </button>
</div>

<!-- Panel de comparación (oculto hasta activar modo) -->
<div id="compare-panel" class="compare-panel hidden">
    <div class="compare-panel-slots">
        <div class="compare-slot" id="compare-slot-1">
            <span class="compare-slot-label">Especie 1</span>
            <span class="compare-slot-name" id="compare-name-1">—</span>
            <button class="compare-slot-clear hidden" id="compare-clear-1" onclick="clearCompareSlot(1)">✕</button>
        </div>
        <div class="compare-vs">VS</div>
        <div class="compare-slot" id="compare-slot-2">
            <span class="compare-slot-label">Especie 2</span>
            <span class="compare-slot-name" id="compare-name-2">—</span>
            <button class="compare-slot-clear hidden" id="compare-clear-2" onclick="clearCompareSlot(2)">✕</button>
        </div>
    </div>
    <button id="btn-run-compare" class="btn-primary hidden" onclick="runComparison()">
        Ver comparación →
    </button>
</div>

<div id="species-results" class="species-grid">
    <div class="search-placeholder">
        <p>Escribí para buscar especies…</p>
    </div>
</div>

<!-- Modal de detalle / comparación -->
<div id="species-modal" class="modal hidden">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-content">
        <button class="modal-close" id="modal-close">✕</button>
        <div id="modal-body"></div>
    </div>
</div>
{% endblock %}
