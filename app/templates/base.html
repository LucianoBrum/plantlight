<!DOCTYPE html>
<html lang="{{ lang or 'es' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PlantLight{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <header class="site-header">
        <a href="/" class="logo">🌿 PlantLight</a>
        <nav>
            <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">{{ t('nav.home', lang or 'es') }}</a>
            <a href="/species" class="{% if request.url.path == '/species' %}active{% endif %}">{{ t('nav.species', lang or 'es') }}</a>
        </nav>
        <div class="lang-toggle-wrapper">
            <button class="lang-btn {% if (lang or 'es') == 'es' %}lang-active{% endif %}" onclick="setLang('es')">ES</button>
            <span class="lang-sep">|</span>
            <button class="lang-btn {% if (lang or 'es') == 'en' %}lang-active{% endif %}" onclick="setLang('en')">EN</button>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>PlantLight — {{ t('site.tagline', lang or 'es') }}</p>
    </footer>

    <script src="/static/js/app.js" defer></script>
    {% block scripts %}{% endblock %}
</body>
</html>
